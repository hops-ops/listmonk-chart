## Listmonk Configuration

replicaCount: 1

image:
  repository: listmonk/listmonk
  pullPolicy: IfNotPresent
  tag: "v6.1.0"

imagePullSecrets: []
# CRITICAL: Do not change after first install when using embedded Postgres - they affect StatefulSet/PVC naming.
# Changing nameOverride changes the StatefulSet name; a new PVC will be created and your existing data PVC will be orphaned.
nameOverride: ""
# Changing fullnameOverride can affect resource names; keep stable across upgrades to avoid orphaned PVCs.
fullnameOverride: ""

## Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

## Pod Security
podAnnotations: {}
podSecurityContext:
  fsGroup: 1000
securityContext:
  runAsUser: 1000
  runAsNonRoot: true
  allowPrivilegeEscalation: false

## Service Configuration
service:
  type: ClusterIP
  port: 9000

## Ingress Configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: example-tls
      hosts:
        - example.com

## Resource Limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

## Autoscaling (disabled by default)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

## Pod Disruption Budget (improves stability during voluntary disruptions)
podDisruptionBudget:
  enabled: true
  minAvailable: 0  # Allow rolling updates; set to 1 to avoid eviction of single replica

## Node Selection
nodeSelector: {}
tolerations: []
affinity: {}

## Probes
livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 9000
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 9000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

# Startup probe: gives app time to start before liveness kills it (avoids crash loops on slow cold start)
startupProbe:
  enabled: true
  httpGet:
    path: /health
    port: 9000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30  # 30 * 5s = 150s max before liveness takes over

## Admin Configuration
admin:
  username: admin
  password: "change-me"

## App Configuration
app:
  address: "0.0.0.0:9000"
  lang: "en"

## Database Configuration
database:
  # When using embedded postgres (postgres.enabled), leave as listmonk-postgres.
  # If using nameOverride/fullnameOverride with external Postgres, set this to your DB host or the Postgres service name.
  host: "listmonk-postgres"
  port: 5432
  name: listmonk
  user: listmonk
  sslMode: disable
  maxOpen: 25
  maxIdle: 25
  maxLifetime: "300s"
  # Password will be fetched from existing secret if provided
  existingSecret: ""
  passwordKey: "password"

## Embedded Postgres (no operator required)
postgres:
  enabled: true
  image:
    repository: "postgres"
    tag: "15"
  # Pre-upgrade migration: scale down & delete StatefulSet (--cascade=orphan) so Helm can recreate it.
  # Set enabled: false to skip (e.g. if the hook fails); then run manual steps from README and retry upgrade.
  migration:
    enabled: true
    image: bitnamilegacy/kubectl:1.29.9  # versioned tag from Bitnami Legacy (bitnami/kubectl:1.30 not found)
  podDisruptionBudget:
    enabled: true
    minAvailable: 1  # Protect single Postgres replica from voluntary eviction
  # Wait for Postgres to accept connections before starting Listmonk (avoids crash loops)
  waitForDatabase: true
  storage:
    size: 4Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi


## SMTP Configuration
smtp:
  enabled: false
  # Create secret with SMTP credentials
  # If existingSecret is set, credentials below are ignored
  existingSecret: ""
  host: "smtp.example.com"
  port: 587
  username: "user@example.com"
  password: "change-me"
  from: "noreply@example.com"
  authProtocol: "login"
  tlsEnabled: true
  tlsSkipVerify: false
  maxConns: 10
  idleTimeout: "15s"
  waitTimeout: "5s"
  maxMsgRetries: 2
  helloHostname: ""

## Database Initialization
init:
  enabled: true
  # Run database initialization as pre-install hook
  runAsHook: false

## Admin API user bootstrap (opt-in; default off — stock-chart-safe)
##
## When enabled, a Helm `post-install,post-upgrade` Hook idempotently
## mints a `type=api` Listmonk User in the database and writes its
## credentials to a Kubernetes Secret in the install namespace, then
## rollout-restarts the Listmonk Deployment so its in-memory apiUsers
## cache reloads with the new row. The Secret keys are `username` +
## `token` — compatible with terraform-provider-listmonk's Basic-Auth
## (and the upjet-generated Crossplane provider-listmonk).
##
## Implementation: post-install,post-upgrade Helm hook.
##   Pre-install was the natural fit but blocked on chicken-and-egg
##   ordering with the chart-managed Postgres StatefulSet and the
##   config.toml ConfigMap (both are main resources, created AFTER
##   pre-install hooks complete — so a pre-install hook can't reach
##   them).
##   Post-install side-steps both issues by deferring the bootstrap
##   until everything is in place. The trade-off is one rollout-restart
##   of the Listmonk Deployment (~30-60s extra wall-time on first
##   install / upgrade) so the apiUsers cache reloads with the
##   newly-INSERTed row — Listmonk's auth.CacheAPIUsers loads only once
##   at pod startup, never on a timer or notify.
##
## Hook resources (all with `helm.sh/hook: post-install,post-upgrade`):
##   weight 0 — ServiceAccount + Role + RoleBinding
##              (delete-policy: before-hook-creation,hook-succeeded)
##   weight 1 — the api-user-bootstrap Job, four containers:
##                prepare-token (read existing Secret OR generate fresh)
##                write-db      (idempotent INSERT … ON CONFLICT)
##                write-secret  (kubectl apply --server-side)
##                restart-listmonk (kubectl rollout restart deployment)
## The schema-init Job (`templates/job-init.yaml`) is a regular main
## resource, NOT a hook. It runs concurrently with these post-install
## hooks; the write-db container polls for the users table before
## attempting any INSERT.
##
## Idempotency contract:
##   - Secret + DB row both exist with matching token → no-op
##   - Secret exists, DB row missing → re-INSERT DB row with the
##     Secret's token (recovery from partial state)
##   - Secret missing, DB row exists → regenerate token, UPDATE DB row,
##     write Secret (token rotation path; trigger by deleting the
##     Secret + helm upgrade)
##   - Neither → generate token, INSERT DB row, write Secret (first
##     install)
##   - Row exists with a non-api `type` → fail fast (refuse to mutate
##     so an interactive admin is never accidentally clobbered)
##
## Stock-chart-safe: gated on createApiUser. Default false. Non-platform
## users see no behavior change.
adminAuth:
  createApiUser: false
  apiUserName: "crossplane-provider"
  # apiUserEmail: defaults to "<apiUserName>@listmonk.local". The
  # Listmonk users table requires a unique non-null email; this value
  # doesn't need to be deliverable.
  apiUserEmail: ""
  # Secret name to write/read in the install namespace. Defaults to
  # `<release>-provider-creds` (using .Release.Name directly so the
  # default name is predictable for downstream composition consumers,
  # not affected by the listmonk.fullname template's release-name-
  # contains-chart-name branching). Override when integrating with an
  # externally-managed Secret store.
  secretName: ""
  # Bootstrap Job image with kubectl. Reuses the same image the postgres
  # migration job pulls so no new image dependency is introduced.
  kubectlImage: "bitnamilegacy/kubectl:1.29.9"

## OIDC Configuration (Listmonk v4.1+ native OIDC, settings keyed under
## `security.oidc.*`).
##
## When enabled, the chart renders a `[security.oidc]` block in config.toml
## with provider URL + provider name. client_id and client_secret are NOT
## written to config.toml — they are projected as env via extraEnvFrom (see
## below) from a separately-managed Secret (e.g. an ExternalSecret target).
##
## Listmonk env-var override format (periods in koanf key replaced by `__`):
##   LISTMONK_security__oidc__client_id
##   LISTMONK_security__oidc__client_secret
##
## So the projected Secret must carry keys exactly named:
##   LISTMONK_security__oidc__client_id
##   LISTMONK_security__oidc__client_secret
##
## The Listmonk OAuth redirect URI is `https://<host>/auth/oidc`; configure
## the same value on the upstream OIDC provider (Zitadel, Keycloak, etc.).
oidc:
  enabled: false
  # OIDC issuer/provider base URL (e.g. https://auth.ops.com.ai)
  providerUrl: ""
  # Display name shown on the Listmonk sign-in page
  providerName: "OIDC"

## extraEnvFrom: appended envFrom sources on the Listmonk container.
## Use for SMTP + OIDC secrets sourced from ExternalSecret / sealed-secrets.
##
## Example:
##   extraEnvFrom:
##     - secretRef:
##         name: listmonk-smtp
##     - secretRef:
##         name: listmonk-oidc-client
extraEnvFrom: []

## extraEnv: explicit env entries appended after the chart's defaults.
## Useful for app-level overrides like LISTMONK_security__enable_oidc.
##
## Example:
##   extraEnv:
##     - name: LISTMONK_security__custom_setting
##       value: "true"
extraEnv: []
