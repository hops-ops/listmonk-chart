    description: 'Listmonk (listmonk.app) — self-hosted newsletter and mailing-list
      manager — packaged for Kubernetes. Fork of redzumi/listmonk-chart that adds
      extraEnv / extraEnvFrom hooks on the Listmonk Deployment (so SMTP and OIDC credentials
      can be projected via env from ExternalSecret-managed Secrets) and exposes a
      [security] OIDC block in the rendered config.toml. '
